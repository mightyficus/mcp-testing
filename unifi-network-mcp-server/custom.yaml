version: 2
name: custom
displayName: Custom MCP Servers
registry:
  unifi-network:
    description: "MCP server for managing UniFi Network consoles - devices, WiFi, firmware, clients, networks, firewall, and reporting"
    title: "UniFi Network"
    type: server
    dateAdded: "2026-02-11T00:00:00Z"
    image: unifi-network-mcp-server:latest
    ref: ""
    readme: ""
    toolsUrl: ""
    source: ""
    upstream: ""
    icon: ""
    tools:
      - name: get_app_info
      - name: list_sites
      - name: get_site_settings
      - name: list_devices
      - name: get_device_details
      - name: get_device_statistics
      - name: restart_device
      - name: power_cycle_port
      - name: adopt_device
      - name: list_pending_devices
      - name: upgrade_device_channel
      - name: upgrade_device_custom
      - name: change_firmware_channel
      - name: check_firmware_updates
      - name: bulk_upgrade_aps
      - name: list_wifi_broadcasts
      - name: get_wifi_broadcast
      - name: create_wifi_broadcast
      - name: update_wifi_broadcast
      - name: delete_wifi_broadcast
      - name: list_clients
      - name: get_client_details
      - name: manage_guest_access
      - name: list_networks
      - name: create_network
      - name: update_network
      - name: delete_network
      - name: list_vouchers
      - name: create_voucher
      - name: delete_voucher
      - name: list_firewall_policies
      - name: generate_device_report
      - name: generate_wifi_report
    secrets:
      - name: UNIFI_API_KEY
        env: UNIFI_API_KEY
        example: "your-unifi-api-key"
    metadata:
      category: monitoring
      tags:
        - unifi
        - networking
        - ubiquiti
      license: MIT
      owner: local
